<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Split Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #e0f2fe 0%, #f8fafc 55%, #e2e8f0 100%);
        color: #0f172a;
      }
      main {
        width: min(520px, 92vw);
        border: 1px solid #cbd5e1;
        border-radius: 18px;
        padding: 1.2rem 1.1rem;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.15);
      }
      h1 {
        margin: 0 0 0.4rem;
        font-size: 1.35rem;
      }
      p {
        margin: 0.35rem 0;
        line-height: 1.45;
      }
      a {
        display: inline-block;
        margin-top: 0.7rem;
        text-decoration: none;
        font-weight: 700;
        color: #0369a1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Expense Split can still open cached screens. Reconnect to sync new expenses and settlements.</p>
      <a href="/">Try reopening dashboard</a>
    </main>
  </body>
</html>
